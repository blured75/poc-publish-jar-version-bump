name: CI/CD Maven Java CLI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version release (ex: 0.1.0)"
        required: true
      next_snapshot_version:
        description: "Version suivante SNAPSHOT (ex: 0.2.0-SNAPSHOT)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build package
        run: mvn -B -ntp clean package

  release:
    name: Release + bump version
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set release version in pom.xml
        run: mvn -B -ntp versions:set -DnewVersion=${{ github.event.inputs.release_version }} -DgenerateBackupPoms=false

      - name: Build release JAR
        run: mvn -B -ntp clean package

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore(release): version ${{ github.event.inputs.release_version }}" || true
          git tag v${{ github.event.inputs.release_version }}
          git push origin HEAD
          git push origin v${{ github.event.inputs.release_version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          files: target/*.jar
          body_path: RELEASE_NOTES.md

      - name: Bump to next snapshot version
        run: |
          mvn -B -ntp versions:set -DnewVersion=${{ github.event.inputs.next_snapshot_version }} -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore: bump version to ${{ github.event.inputs.next_snapshot_version }}"
          git push origin HEAD
